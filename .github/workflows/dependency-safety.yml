name: Dependency Safety

on:
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
      - "npm-shrinkwrap.json"
      - "extension-firefox/package.json"
      - "extension-firefox/package-lock.json"
      - "extension-firefox/npm-shrinkwrap.json"
      - "scripts/check-banned-packages.js"
      - ".github/dependabot.yml"
      - ".github/workflows/dependency-safety.yml"
  push:
    branches:
      - main
    paths:
      - "package.json"
      - "package-lock.json"
      - "npm-shrinkwrap.json"
      - "extension-firefox/package.json"
      - "extension-firefox/package-lock.json"
      - "extension-firefox/npm-shrinkwrap.json"
      - "scripts/check-banned-packages.js"
      - ".github/dependabot.yml"
      - ".github/workflows/dependency-safety.yml"
  workflow_dispatch:

jobs:
  policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24.13.0

      - name: Check blocked package versions
        run: npm run security:deps

      - name: Check blocked package versions for Firefox extension
        working-directory: extension-firefox
        run: npm run security:deps

  audit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - "."
          - "extension-firefox"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24.13.0

      - name: Audit lockfile
        working-directory: ${{ matrix.project }}
        run: npm run security:audit
